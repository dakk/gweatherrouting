name: Windows Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows Portable ZIP

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gobject-introspection
            mingw-w64-x86_64-gdal
            mingw-w64-x86_64-python-gdal
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-matplotlib
            mingw-w64-x86_64-python-pyproj
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-adwaita-icon-theme

      - name: Install Python Dependencies
        shell: msys2 {0}
        run: |
          pip install --break-system-packages pyinstaller
          pip install --break-system-packages requests colorlog geojson_utils bs4 pyserial pynmea2 gpxpy nmeatoolkit weatherrouting
          pip install --break-system-packages --no-build-isolation --no-deps .

      - name: Patch osgeo __init__.py for PyInstaller compatibility
        shell: msys2 {0}
        run: |
          OSGEO_DIR=$(python -c "import osgeo; import os; print(os.path.dirname(osgeo.__file__))")
          GDAL_VERSION=$(python -c "from osgeo import gdal; print(gdal.VersionInfo('RELEASE_NAME'))")
          echo "Patching $OSGEO_DIR/__init__.py with version $GDAL_VERSION"
          echo "__version__ = '$GDAL_VERSION'" > "$OSGEO_DIR/__init__.py"

      - name: Build Windows Executable
        shell: msys2 {0}
        run: |
          cd gweatherrouting

          # Find MSYS2 Python site-packages and osgeo paths
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          OSGEO_DIR=$(python -c "import osgeo; import os; print(os.path.dirname(osgeo.__file__))")
          echo "Site-packages: $SITE_PACKAGES"
          echo "osgeo dir: $OSGEO_DIR"
          SITE_PACKAGES_WIN=$(cygpath -w "$SITE_PACKAGES")
          OSGEO_DIR_WIN=$(cygpath -w "$OSGEO_DIR")

          # Collect typelib flags
          TYPELIB_FLAGS=""
          for typelib in Gtk-3.0 Gdk-3.0 GdkPixbuf-2.0 Pango-1.0 PangoCairo-1.0 GObject-2.0 GLib-2.0 Gio-2.0 cairo-1.0 Atk-1.0 HarfBuzz-0.0 freetype2-2.0 GModule-2.0 GdkWin32-3.0; do
            typelibfile="/mingw64/lib/girepository-1.0/${typelib}.typelib"
            if [ -f "$typelibfile" ]; then
              TYPELIB_FLAGS="$TYPELIB_FLAGS --add-data $(cygpath -w "$typelibfile");gi_typelibs"
            fi
          done

          pyinstaller --name GWeatherRouting \
            --windowed \
            --icon ../windows/icon.ico \
            --paths "$SITE_PACKAGES_WIN" \
            --paths "$OSGEO_DIR_WIN" \
            --hidden-import=gi \
            --hidden-import=osgeo \
            --hidden-import=osgeo._gdal \
            --hidden-import=osgeo._ogr \
            --hidden-import=osgeo._osr \
            --hidden-import=osgeo._gdalconst \
            --collect-submodules=gi \
            --collect-all=osgeo \
            --add-data "data;gweatherrouting/data" \
            --add-data "gtk;gweatherrouting/gtk" \
            --runtime-hook ../windows/pyinstaller_gi_hook_win.py \
            $TYPELIB_FLAGS \
            __main__.py

      - name: Copy runtime files
        shell: msys2 {0}
        run: |
          DIST="gweatherrouting/dist/GWeatherRouting"

          # Copy all MSYS2 mingw64 DLLs (GDAL, GTK, etc.)
          for dll in /mingw64/bin/*.dll; do
            cp "$dll" "$DIST/" 2>/dev/null || true
          done

      - name: Copy GTK runtime files
        shell: msys2 {0}
        run: |
          DIST="gweatherrouting/dist/GWeatherRouting"

          # GTK schemas
          mkdir -p "$DIST/share/glib-2.0/schemas"
          cp -r /mingw64/share/glib-2.0/schemas/* "$DIST/share/glib-2.0/schemas/"

          # Icons
          mkdir -p "$DIST/share/icons"
          cp -r /mingw64/share/icons/Adwaita "$DIST/share/icons/"
          cp -r /mingw64/share/icons/hicolor "$DIST/share/icons/"

          # Pixbuf loaders
          mkdir -p "$DIST/lib/gdk-pixbuf-2.0"
          cp -r /mingw64/lib/gdk-pixbuf-2.0/* "$DIST/lib/gdk-pixbuf-2.0/"

          # GDAL data
          if [ -d /mingw64/share/gdal ]; then
            mkdir -p "$DIST/share/gdal"
            cp -r /mingw64/share/gdal/* "$DIST/share/gdal/"
          fi

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GWeatherRouting-win64
          path: gweatherrouting/dist/GWeatherRouting/
